name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests (unit + examples with VCR replay)
        env:
          # Cassettes were recorded against the public Ollama Cloud API.
          # VCR matches on method + uri, so the runtime URI must equal
          # what's in the cassette for replay to work.
          OLLAMA_BASE_URL: https://api.ollama.com
        run: bundle exec rake test
